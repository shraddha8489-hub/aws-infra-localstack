name: Terraform CI/CD Pipeline

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

env:
  TF_VERSION: "1.9.0"
  PYTHON_VERSION: "3.12"

jobs:
  # ────────────────────────────────────────────
  # Job 1: Lint and validate the Flask app
  # ────────────────────────────────────────────
  lint-app:
    name: Lint Flask App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install flake8 pytest
          pip install -r app/requirements.txt

      - name: Lint with flake8
        run: |
          flake8 app/app.py \
            --max-line-length=120 \
            --ignore=E501,W503

  # ────────────────────────────────────────────
  # Job 2: Terraform format, validate, and plan
  # ────────────────────────────────────────────
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: lint-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive
        working-directory: terraform

      - name: Terraform Init
        run: terraform init
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1

      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform

      - name: Start LocalStack
        uses: LocalStack/setup-localstack@v0.2.3
        with:
          image-tag: latest
          install-awslocal: true
        env:
          LOCALSTACK_ACKNOWLEDGE_ACCOUNT_REQUIREMENT: "1"

      - name: Wait for LocalStack to be ready
        run: |
          echo "Waiting for LocalStack..."
          for i in {1..30}; do
            if curl -s http://localhost:4566/_localstack/health | grep -q '"s3": "running"'; then
              echo "LocalStack is ready!"
              break
            fi
            sleep 2
          done

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan
          retention-days: 5

  # ────────────────────────────────────────────
  # Job 3: Terraform apply (only on main branch)
  # ────────────────────────────────────────────
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1

      - name: Start LocalStack
        uses: LocalStack/setup-localstack@v0.2.3
        with:
          image-tag: latest
          install-awslocal: true
        env:
          LOCALSTACK_ACKNOWLEDGE_ACCOUNT_REQUIREMENT: "1"

      - name: Wait for LocalStack to be ready
        run: |
          echo "Waiting for LocalStack..."
          for i in {1..30}; do
            if curl -s http://localhost:4566/_localstack/health | grep -q '"s3": "running"'; then
              echo "LocalStack is ready!"
              break
            fi
            sleep 2
          done

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1

      - name: Verify resources were created
        run: |
          echo "--- S3 Buckets ---"
          awslocal s3 ls

          echo "--- SQS Queues ---"
          awslocal sqs list-queues

          echo "--- DynamoDB Tables ---"
          awslocal dynamodb list-tables

  # ────────────────────────────────────────────
  # Job 4: Build and test Docker image
  # ────────────────────────────────────────────
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: lint-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t flask-app:${{ github.sha }} ./app

      - name: Test Docker image starts
        run: |
          docker run -d \
            --name flask-test \
            -p 5000:5000 \
            -e LOCALSTACK_URL=http://localhost:4566 \
            flask-app:${{ github.sha }}
          sleep 5
          docker logs flask-test
          docker stop flask-test